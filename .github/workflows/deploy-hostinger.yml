name: Sync Submittal Tracker for Hostinger Git Deploy

# Hostinger's Node.js Git auto-deploy pulls from this repo automatically.
# This workflow just ensures deploy/submittal-tracker/index.html stays in sync
# with the source HTML whenever it changes.

on:
  push:
    branches: [main, claude/construction-capabilities-doc-wIG7b]
    paths:
      - 'tools/construction-submittals/submittal_tracker.html'
  workflow_dispatch:

jobs:
  sync:
    name: Sync index.html
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync HTML to deploy folder
        run: |
          cp tools/construction-submittals/submittal_tracker.html deploy/submittal-tracker/index.html
          if git diff --quiet deploy/submittal-tracker/index.html; then
            echo "No changes to sync."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add deploy/submittal-tracker/index.html
            git commit -m "chore: sync submittal tracker HTML to deploy folder"
            git push
          fi
